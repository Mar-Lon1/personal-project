<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind css CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FONT AWESOME LINK -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Manto</title>




</head>

<body>
    <!-- hero section with nav bar -->
    <div class="bg-[url('hero.png')] h-[1200px] bg-center bg-cover text-white">
        <!-- Navbar -->
        <header>
            <nav class="flex justify-between p-8">
                <!-- Logo -->
                <div class="font-bold">MANTO</div>
                <!-- nav links -->
                <div class="space-x-4">
                    <a href="">Furniture</a>
                    <a href="">Shop</a>
                    <a href="">About Us</a>
                    <a href="">Contact</a>
                </div>
                <!-- icon -->
                <div>
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
            </nav>
        </header>
        <!-- Hero Sections -->
        <div>
            <h1 class="text-white text-6xl mx-120 text-center p-3 font-bold ">Make Your Interior More Minimalistic & Mordern</h1>
            <p class="text-gray-500 text-sm mx-165 text-center my-8 ">Turn your room with Manto into a lot more minimalist and mordern with ease and speed</p>
            <!-- search -->
            <div class="flex items-center justify-center mt-8">
                <div class="bg-white/30 rounded-2xl px-3 py-2 w-98 flex items-center">
                    <input type="text" placeholder="Search furniture" class="bg-transparent outline-none w-full">
                    <i class="fa-solid fa-magnifying-glass bg-orange-500 rounded-full p-3"></i>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
